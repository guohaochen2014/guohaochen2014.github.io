<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录</title>
<style>
body{background:#f4f5f7;display:grid;place-items:center;height:100vh;margin:0}
.box{background:white;padding:30px;border-radius:12px;width:100%;max-width:400px}
h2{text-align:center;margin-bottom:20px}
input{width:100%;padding:10px;margin-bottom:12px;border:1px solid #ddd;border-radius:6px}
button{width:100%;padding:10px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer}
a{display:block;text-align:center;margin-top:10px;color:#666}
</style>
</head>
<body>
<div class="box">
  <h2>登录</h2>
  <input id="username" placeholder="用户名">
  <input id="pwd" type="password" placeholder="密码">
  <button onclick="login()">登录</button>
  <a href="shbs-register.html">注册账号</a>
  <a href="shbs-index.html">返回首页</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const supabase = createClient('https://eonkotdvmcqabiglylyu.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbmtvdGR2bWNxYWJpZ2x5bHl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1Njk1OTYsImV4cCI6MjA5MjE0NTU5Nn0.TaXB2HHLL27rpaYAAn18IcJrPQLtnfsSaQq89cnmXxY');

async function login(){
  const user = document.getElementById('username').value;
  const pwd = document.getElementById('pwd').value;
  const { data } = await supabase.from('users').select('*').eq('username', user).eq('pwd', pwd).single();
  if(!data) return alert('账号或密码错误');
  localStorage.setItem('user', JSON.stringify(data));
  location.href = 'shbs-index.html';
}
</script>
</body>
</html>
