<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#f4f5f7;padding:20px}
.container{max-width:900px;margin:0 auto}
.head{background:white;padding:20px;border-radius:12px;margin-bottom:20px;text-align:center}
.back{display:inline-block;margin-top:10px;color:#2563eb;text-decoration:none}
.table-card{background:white;padding:20px;border-radius:12px}
table{width:100%;border-collapse:collapse}
th,td{padding:12px;text-align:left;border-bottom:1px solid #eee}
th{background:#f8f9fa}
.btn{padding:6px 10px;border:none;border-radius:6px;cursor:pointer;margin:2px}
.btn-green{background:#10b981;color:white}
.btn-orange{background:#f59e0b;color:white}
.btn-red{background:red;color:white}
input{padding:6px;width:100px;border:1px solid #ddd;border-radius:6px}
</style>
</head>
<body>
<div class="container">
  <div class="head"><h1>用户管理</h1><a class="back" href="shbs-index.html">返回首页</a></div>
  <div class="table-card"><table><thead><tr><th>用户</th><th>密码</th><th>管理员</th><th>操作</th></tr></thead><tbody id="list"></tbody></table></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = supabase.createClient('https://eonkotdvmcqabiglylyu.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbmtvdGR2bWNxYWJpZ2x5bHl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1Njk1OTYsImV4cCI6MjA5MjE0NTU5Nn0.TaXB2HHLL27rpaYAAn18IcJrPQLtnfsSaQq89cnmXxY');
const me = JSON.parse(localStorage.getItem('user'));
if(!me || !me.is_admin){ document.body.innerHTML = '<h1>无权限</h1><a href="shbs-index.html">首页</a>'; }

async function load(){
  const { data } = await supabase.from('users').select('*').order('id');
  document.getElementById('list').innerHTML = data.map(u=>`
  <tr>
    <td><input id="un_${u.id}" value="${u.username}"></td>
    <td><input id="pw_${u.id}" value="${u.pwd}"></td>
    <td>${u.is_admin?'是':'否'}</td>
    <td>
      <button class="btn btn-green" onclick="save(${u.id})">保存</button>
      <button class="btn btn-orange" onclick="toggle(${u.id})">${u.is_admin?'取消':'设为'}管理员</button>
      <button class="btn btn-red" onclick="del(${u.id})">删除</button>
    </td>
  </tr>`).join('');
}

async function save(id){
  const un = document.getElementById('un_'+id).value;
  const pw = document.getElementById('pw_'+id).value;
  await supabase.from('users').update({username:un,pwd:pw}).eq('id',id);
  load();
}

async function toggle(id){
  const { data } = await supabase.from('users').select('is_admin').eq('id',id).single();
  await supabase.from('users').update({is_admin:!data.is_admin}).eq('id',id);
  load();
}

async function del(id){
  if(!confirm('确定删除？')) return;
  await supabase.from('users').delete().eq('id',id);
  load();
}

load();
</script>
</body>
</html>
