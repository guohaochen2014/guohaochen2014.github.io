<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Metro LCD Maker - 纯净自定义版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #f5f7fa;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .title-bar {
            width: 100%;
            max-width: 1200px;
            background: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .lcd-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: center;
        }
        .lcd {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #e0e0e0;
        }
        .lcd-left {
            color: #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
        }
        .lcd-left::after {
            content: "";
            position: absolute;
            right: 0;
            top: 0;
            width: 15px;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.15), transparent);
        }
        .lcd-right {
            flex: 1;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: #fff;
        }
        .line-info {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .sub-info {
            font-size: 16px;
            opacity: 0.9;
        }
        .terminal {
            font-size: 22px;
            font-weight: bold;
        }
        .main-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        .station-name {
            font-size: 32px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        .station-line {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            margin-bottom: 10px;
        }
        .door-info {
            font-size: 14px;
            color: #666;
        }
        .page-switch {
            width: 100%;
            max-width: 1200px;
            background: #fff;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .page-btn {
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            border: 1px solid #ddd;
            background: #f8f9fa;
            font-size: 13px;
        }
        .page-btn.active {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }
        .editor {
            width: 100%;
            max-width: 1200px;
            background: #fff;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        input, select, button {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        input[type="color"] {
            padding: 2px;
            height: 36px;
            width: 40px;
        }
        button {
            background: #2563eb;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        .station-path {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            margin: 10px 0;
            position: relative;
        }
        .station-progress {
            height: 100%;
            border-radius: 4px;
        }
        .station-marker {
            position: absolute;
            top: -3px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid;
            transform: translateX(-50%);
        }
        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 13px;
        }
        .info-table th, .info-table td {
            padding: 6px 10px;
            text-align: left;
            border-bottom: 1px solid #e5e7eb;
        }
        .door-guide {
            display: flex;
            align-items: center;
            margin-top: 15px;
        }
        .train-car {
            width: 60px;
            height: 30px;
            background: #e5e7eb;
            margin: 0 5px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #6b7280;
        }
        .train-car.active {
            color: #fff;
        }
        .platform-door {
            width: 2px;
            height: 30px;
            background: #374151;
            margin: 0 10px;
        }
    </style>
</head>
<body>

<div class="title-bar">
    <span>Metro LCD Maker - 纯净自定义版</span>
    <span>无预设 · 可自定义尺寸</span>
</div>

<div class="editor">
    <input type="number" id="lcd-width" placeholder="LCD宽度（px）" value="900">
    <input type="number" id="lcd-height" placeholder="LCD高度（px）" value="220">
    <input type="number" id="lcd-left-width" placeholder="左侧宽度（px）" value="280">
    <button onclick="applySize()">应用尺寸</button>
</div>

<div class="lcd-container">
    <div class="lcd" id="lcd">
        <div class="lcd-left" id="lcdLeft">
            <div class="line-info" id="lineName"></div>
            <div class="sub-info" id="subInfo"></div>
            <div class="terminal" id="terminal"></div>
        </div>
        <div class="lcd-right" id="lcdRight">
            <div class="main-title" id="mainTitle"></div>
            <div class="station-name" id="stationName"></div>
            <div class="station-line" id="stationLine"></div>
            <div class="door-info" id="doorInfo"></div>
        </div>
    </div>
</div>

<div class="page-switch">
    <div class="page-btn active" onclick="switchPage('arrived')">已到达</div>
    <div class="page-btn" onclick="switchPage('next')">即将到达</div>
    <div class="page-btn" onclick="switchPage('travel')">行进中</div>
    <div class="page-btn" onclick="switchPage('info')">站点信息</div>
    <div class="page-btn" onclick="switchPage('door')">开门指引</div>
</div>

<div class="editor" id="editor">
    <div id="editor-arrived" class="page-editor">
        <input type="text" id="arrived-title" placeholder="标题">
        <input type="text" id="arrived-line" placeholder="线路">
        <input type="text" id="arrived-station" placeholder="当前车站">
        <input type="text" id="arrived-eng" placeholder="英文">
        <input type="text" id="arrived-transfer" placeholder="换乘">
        <input type="text" id="arrived-door" placeholder="开门方向">
        <input type="color" id="arrived-color" value="#000000">
        <button onclick="savePage('arrived')">保存</button>
    </div>
    <div id="editor-next" class="page-editor" style="display:none;">
        <input type="text" id="next-title" placeholder="标题">
        <input type="text" id="next-line" placeholder="线路">
        <input type="text" id="next-station" placeholder="即将到达车站">
        <input type="text" id="next-eng" placeholder="英文">
        <input type="text" id="next-transfer" placeholder="换乘">
        <input type="text" id="next-door" placeholder="开门方向">
        <input type="color" id="next-color" value="#000000">
        <button onclick="savePage('next')">保存</button>
    </div>
    <div id="editor-travel" class="page-editor" style="display:none;">
        <input type="text" id="travel-title" placeholder="标题">
        <input type="text" id="travel-line" placeholder="线路">
        <input type="text" id="travel-stations" placeholder="站点列表（逗号分隔）">
        <input type="number" id="travel-progress" placeholder="行进进度（0-100）">
        <input type="text" id="travel-door" placeholder="开门方向">
        <input type="color" id="travel-color" value="#000000">
        <button onclick="savePage('travel')">保存</button>
    </div>
    <div id="editor-info" class="page-editor" style="display:none;">
        <input type="text" id="info-title" placeholder="标题">
        <input type="text" id="info-line" placeholder="线路">
        <input type="text" id="info-station" placeholder="车站">
        <input type="text" id="info-eng" placeholder="英文">
        <input type="text" id="info-transfer" placeholder="换乘">
        <input type="text" id="info-time" placeholder="首末班车">
        <input type="color" id="info-color" value="#000000">
        <button onclick="savePage('info')">保存</button>
    </div>
    <div id="editor-door" class="page-editor" style="display:none;">
        <input type="text" id="door-title" placeholder="标题">
        <input type="text" id="door-line" placeholder="线路">
        <input type="text" id="door-station" placeholder="车站">
        <input type="text" id="door-cars" placeholder="开门车厢（逗号分隔）">
        <input type="text" id="door-side" placeholder="开门方向">
        <input type="color" id="door-color" value="#000000">
        <button onclick="savePage('door')">保存</button>
    </div>
    <button onclick="exportImage()" style="background:#22c55e;">导出图片</button>
</div>

<script>
    let currentPage = 'arrived';
    let pageData = {
        arrived: { title: '', line: '', station: '', eng: '', transfer: '', door: '', color: '#000000' },
        next: { title: '', line: '', station: '', eng: '', transfer: '', door: '', color: '#000000' },
        travel: { title: '', line: '', stations: '', progress: 50, door: '', color: '#000000' },
        info: { title: '', line: '', station: '', eng: '', transfer: '', time: '', color: '#000000' },
        door: { title: '', line: '', station: '', cars: '', side: '', color: '#000000' }
    };

    function applySize() {
        const w = document.getElementById('lcd-width').value || 900;
        const h = document.getElementById('lcd-height').value || 220;
        const lw = document.getElementById('lcd-left-width').value || 280;
        document.getElementById('lcd').style.width = w + 'px';
        document.getElementById('lcd').style.height = h + 'px';
        document.getElementById('lcdLeft').style.width = lw + 'px';
    }

    function switchPage(page) {
        savePage(currentPage);
        currentPage = page;
        document.querySelectorAll('.page-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        document.querySelectorAll('.page-editor').forEach(editor => editor.style.display = 'none');
        document.getElementById(`editor-${page}`).style.display = 'flex';
        loadPage();
    }

    function loadPage() {
        const data = pageData[currentPage];
        document.getElementById('lcdLeft').style.background = data.color;
        document.getElementById('stationLine').style.background = data.color;
        document.getElementById('lineName').innerText = data.line;
        document.getElementById('mainTitle').innerText = data.title;
        document.getElementById('stationName').innerText = data.station || '';
        document.getElementById('doorInfo').innerText = data.door || data.side || '';

        Object.keys(data).forEach(key => {
            const input = document.getElementById(`${currentPage}-${key}`);
            if (input) input.value = data[key];
        });

        renderSpecialContent();
    }

    function savePage(page) {
        const data = pageData[page];
        Object.keys(data).forEach(key => {
            const input = document.getElementById(`${page}-${key}`);
            if (input) data[key] = input.value;
        });
        loadPage();
    }

    function renderSpecialContent() {
        const right = document.getElementById('lcdRight');
        const data = pageData[currentPage];
        right.innerHTML = `
            <div class="main-title" id="mainTitle">${data.title}</div>
            <div class="station-name" id="stationName">${data.station || ''}</div>
            <div class="station-line" id="stationLine" style="background:${data.color};"></div>
            <div class="door-info" id="doorInfo">${data.door || data.side || ''}</div>
        `;

        if (currentPage === 'travel') {
            const stations = (data.stations || '').split(',').map(s => s.trim()).filter(Boolean);
            const progress = data.progress || 0;
            right.innerHTML = `
                <div class="main-title" id="mainTitle">${data.title}</div>
                <div class="station-path">
                    <div class="station-progress" style="width:${progress}%; background:${data.color};"></div>
                    ${stations.map((s, i) => `
                        <div class="station-marker" style="left:${(i/(stations.length-1||1))*100}%; border-color:${data.color};"></div>
                    `).join('')}
                </div>
                <div class="door-info" id="doorInfo">${data.door}</div>
            `;
        }

        if (currentPage === 'info') {
            right.innerHTML = `
                <div class="main-title" id="mainTitle">${data.title}</div>
                <table class="info-table">
                    <tr><th>车站</th><td>${data.station}</td></tr>
                    <tr><th>英文</th><td>${data.eng}</td></tr>
                    <tr><th>换乘</th><td>${data.transfer}</td></tr>
                    <tr><th>首末班车</th><td>${data.time}</td></tr>
                </table>
            `;
        }

        if (currentPage === 'door') {
            const cars = (data.cars || '').split(',').map(c => c.trim()).filter(Boolean);
            right.innerHTML = `
                <div class="main-title" id="mainTitle">${data.title}</div>
                <div class="door-guide">
                    ${[1,2,3,4,5,6].map(c => `
                        <div class="train-car ${cars.includes(c.toString()) ? 'active' : ''}" style="background:${cars.includes(c.toString()) ? data.color : '#e5e7eb'};">${c}</div>
                    `).join('')}
                </div>
                <div class="door-info" id="doorInfo">${data.side}</div>
            `;
        }
    }

    function exportImage() {
        const script = document.createElement('script');
        script.src = 'https://html2canvas.hertzen.com/dist/html2canvas.min.js';
        script.onload = () => {
            html2canvas(document.getElementById('lcd')).then(canvas => {
                const link = document.createElement('a');
                link.download = 'metro-lcd.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        };
        document.head.appendChild(script);
    }

    applySize();
    loadPage();
</script>

</body>
</html>
