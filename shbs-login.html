<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录</title>
<style>
body{background:#f4f5f7;display:grid;place-items:center;height:100vh;margin:0;font-family:sans-serif}
.box{background:white;padding:30px;border-radius:12px;width:100%;max-width:400px}
h2{text-align:center;margin-bottom:20px}
input{width:100%;padding:10px;margin-bottom:12px;border:1px solid #ddd;border-radius:6px}
button{width:100%;padding:10px;background:#2563eb;color:white;border:none;border-radius:6px;cursor:pointer}
a{display:block;text-align:center;margin-top:10px;color:#666}
</style>
</head>
<body>
<div class="box">
  <h2>登录</h2>
  <input id="user" placeholder="用户名">
  <input id="pwd" type="password" placeholder="密码">
  <button onclick="login()">登录</button>
  <a href="shbs-register.html">注册账号</a>
  <a href="shbs-index.html">返回首页</a>
</div>

<script>
function login(){
  const username = document.getElementById('user').value
  const password = document.getElementById('pwd').value
  const users = JSON.parse(localStorage.getItem('busUsers')) || [
    {username:"admin",pwd:"admin",isAdmin:true}
  ]
  const u = users.find(x=>x.username===username&&x.pwd===password)
  if(!u) return alert('账号或密码错误')
  localStorage.setItem('user',JSON.stringify(u))
  location.href='shbs-index.html'
}
</script>
</body>
</html>
