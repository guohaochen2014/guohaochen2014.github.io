<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>搜索</title>
<style>
body{background:#f4f5f7;padding:20px}
.box{background:white;padding:20px;border-radius:12px;margin-bottom:20px}
input{width:100%;padding:12px;border-radius:8px;border:1px solid #ddd;font-size:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.card{background:white;border-radius:10px;overflow:hidden}
.card img{width:100%;height:160px;object-fit:cover}
.info{padding:10px;font-size:13px}
.back{position:fixed;top:20px;left:20px;background:#2563eb;color:white;padding:8px 12px;border-radius:6px;text-decoration:none}
</style>
</head>
<body>
<a class="back" href="shbs-index.html">首页</a>
<div class="box"><input id="kw" placeholder="搜索" oninput="load()"></div>
<div id="grid" class="grid"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = supabase.createClient('https://eonkotdvmcqabiglylyu.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvbmtvdGR2bWNxYWJpZ2x5bHl1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1Njk1OTYsImV4cCI6MjA5MjE0NTU5Nn0.TaXB2HHLL27rpaYAAn18IcJrPQLtnfsSaQq89cnmXxY');
async function load(){
  const kw = document.getElementById('kw').value.toLowerCase();
  const { data } = await supabase.from('images').select('*');
  const r = data.filter(i=>(i.line+i.code+i.place+i.descr+i.username).toLowerCase().includes(kw));
  document.getElementById('grid').innerHTML = r.map(i=>`
  <div class="card"><img src="${i.img}"><div class="info">${i.line} ${i.code||''}<br>${i.place}</div></div>`).join('');
}
</script>
</body>
</html>
